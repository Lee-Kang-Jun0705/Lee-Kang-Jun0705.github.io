let audio=new Audio(),currentBtn=null;
function play(url,btn){
  if(currentBtn===btn&&!audio.paused){audio.pause();btn.classList.remove('playing');btn.textContent=btn.dataset.label||'▶';currentBtn=null;return}
  if(currentBtn){currentBtn.classList.remove('playing');currentBtn.textContent=currentBtn.dataset.label||'▶'}
  audio.pause();audio.src=url;audio.play().catch(()=>{});
  btn.classList.add('playing');if(!btn.dataset.label)btn.dataset.label=btn.textContent;
  btn.textContent='⏸';currentBtn=btn;
}
audio.addEventListener('ended',()=>{if(currentBtn){currentBtn.classList.remove('playing');currentBtn.textContent=currentBtn.dataset.label||'▶';currentBtn=null}});
function renderFinal(){
  document.getElementById('final').innerHTML=MERCS.map(m=>`
    <div class="merc-card gender-${m.gender}" data-search="${(m.name+' '+m.mercClass+' '+m.owner+' '+m.ref+' '+Object.values(m.clips).join(' ')).toLowerCase()}">
      <div class="merc-header"><div><span class="merc-name">${m.name}</span> <span class="merc-class">· ${m.mercClass}</span><span class="merc-ref">${m.ref}</span><span class="merc-stab">stab=${m.stability}</span></div></div>
      <div class="merc-narrative">${m.narrative}</div>
      <div class="clip-grid">
        ${[['sig','시그니처',m.sig_id],['bark1','BARK 1',m.owner+'-bark-1'],['bark2','BARK 2',m.owner+'-bark-2'],['death1','DEATH',m.owner+'-death-1']].map(([k,label,fname])=>`
          <div class="clip-row">
            <button class="play-btn" onclick="play('/assets/voice/ko/${fname}.mp3',this)">▶</button>
            <div class="clip-meta"><div class="clip-label">${label}</div><div class="clip-text">${m.clips[k]}</div></div>
          </div>`).join('')}
      </div>
      <textarea class="feedback-box" placeholder="이 용병 톤 메모 (swap c1/c2, 재작성 요청 등)…" data-owner="${m.owner}"></textarea>
    </div>`).join('');
}
function renderCandidates(){
  document.getElementById('candidates').innerHTML=MERCS.map(m=>`
    <div class="merc-card gender-${m.gender}" data-search="${(m.name+' '+m.owner+' '+m.ref).toLowerCase()}">
      <div class="merc-header"><div><span class="merc-name">${m.name}</span> <span class="merc-class">· ${m.mercClass}</span><span class="merc-ref">${m.ref}</span></div></div>
      <div class="clip-label" style="margin-bottom:8px;">같은 preview_text를 3 candidate로 합성 · 현재: ${m.voice_id.substring(0,10)}…</div>
      <div class="cand-row">
        ${m.candidates.map(c=>{const cur=c.voice_id===m.voice_id;return `<button class="cand-btn ${cur?'current':''}" onclick="play('${c.url}',this)" data-label="▶ Cand ${c.idx}${cur?' ✓':''}">▶ Cand ${c.idx}${cur?' ✓':''}</button>`}).join('')}
      </div>
    </div>`).join('');
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));

  t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active');
}));
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.merc-card').forEach(c=>c.classList.toggle('hidden',q&&!c.dataset.search.includes(q)));
});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!['TEXTAREA','INPUT'].includes(e.target.tagName)){e.preventDefault();if(audio.paused)audio.play();else audio.pause()}
});
renderFinal();renderCandidates();
</script></body></html>
