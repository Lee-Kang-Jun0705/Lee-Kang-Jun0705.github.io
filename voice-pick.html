<script>
const MERCS=JSON.parse(document.getElementById("data").textContent);
let audio=new Audio(),cur=null;
function play(u,b){if(cur===b&&!audio.paused){audio.pause();b.classList.remove("playing");b.textContent="▶";cur=null;return}
if(cur){cur.classList.remove("playing");cur.textContent="▶"}
audio.pause();audio.src=u;audio.play().catch(e=>console.error(e));
b.classList.add("playing");b.textContent="⏸";cur=b}
audio.addEventListener("ended",()=>{if(cur){cur.classList.remove("playing");cur.textContent="▶";cur=null}});
function render(){const r=document.getElementById("cards");r.innerHTML="";
MERCS.forEach(m=>{const c=document.createElement("div");c.className="merc-card gender-"+m.gender;
c.dataset.search=(m.name+" "+m.mercClass+" "+m.owner+" "+m.narrative+" "+m.clips.map(x=>x.text).join(" ")).toLowerCase();
const h=document.createElement("div");h.className="merc-header";
h.innerHTML='<div><span class="merc-name"></span> <span class="merc-class"></span></div><div class="merc-voice"></div>';
h.querySelector(".merc-name").textContent=m.name;
h.querySelector(".merc-class").textContent="· "+m.mercClass;
h.querySelector(".merc-voice").textContent="🎤 "+m.voiceName+" · "+m.descriptive+"/"+m.accent+" · stab="+m.stability;
c.appendChild(h);
const n=document.createElement("div");n.className="merc-narrative";n.textContent=m.narrative;c.appendChild(n);
const g=document.createElement("div");g.className="clip-grid";
m.clips.forEach(x=>{const row=document.createElement("div");row.className="clip-row";
const b=document.createElement("button");b.className="play-btn";b.textContent="▶";
b.onclick=()=>play("/assets/voice/ko/"+x.file,b);row.appendChild(b);
const me=document.createElement("div");me.className="clip-meta";
me.innerHTML='<div class="clip-label"></div><div class="clip-text"></div>';
me.querySelector(".clip-label").textContent=x.label;
me.querySelector(".clip-text").textContent=x.text;
row.appendChild(me);g.appendChild(row)});
c.appendChild(g);r.appendChild(c)})}
document.getElementById("search").addEventListener("input",e=>{const q=e.target.value.toLowerCase().trim();
document.querySelectorAll(".merc-card").forEach(c=>{c.style.display=(!q||c.dataset.search.includes(q))?"":"none"})});
render();
</script></body></html>
