    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #1a0d12;
        color: #f0d8b0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #boot-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2a1218 0%, #0a0508 80%);
        z-index: 9999;
        transition: opacity 0.45s ease;
      }
      #boot-loading[data-done="true"] {
        opacity: 0;
        pointer-events: none;
      }
      #boot-loading .title {
        display: grid;
        gap: 5px;
        text-align: center;
        font-size: 30px;

      }
      #boot-loading .title small {
        display: block;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: rgba(230, 200, 140, 0.72);
      }
      #boot-loading .bar-wrap {
        width: min(70vw, 360px);
        height: 8px;
        background: rgba(60, 30, 20, 0.6);
        border: 1px solid rgba(200, 150, 80, 0.35);
        border-radius: 6px;
        overflow: hidden;
        box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.6);
      }
      #boot-loading .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c89060, #e6c98c, #fbe6a4);
        box-shadow: 0 0 10px rgba(230, 180, 90, 0.6);
        transition: width 0.25s ease;
      }
      #boot-loading .pct {
        margin-top: 14px;

        font-variant-numeric: tabular-nums;
      }
      #boot-loading .status {
        margin-top: 6px;
        font-size: 12px;
        letter-spacing: 0.1em;
        color: rgba(230, 200, 140, 0.55);
      }

  <body>
    <div id="boot-loading" role="status" aria-live="polite">
      <div class="title"><span>검은계약 용병단</span><small>Black Contract Company: Ashen Kingdom</small></div>
      <div class="bar-wrap"><div class="bar-fill" id="boot-bar"></div></div>
      <div class="pct" id="boot-pct">0%</div>
      <div class="status" id="boot-status">초기화중...</div>
    </div>
    <div id="app">
      <div id="game"></div>
      <aside id="hud" aria-live="polite"></aside>
    </div>
    <script>
      // 부트 진행률 추적 — 마일스톤 + smooth interpolation
      (function () {
        var bar = document.getElementById("boot-bar"),
          pct = document.getElementById("boot-pct"),
          st = document.getElementById("boot-status"),
          root = document.getElementById("boot-loading");
        var target = 5,
          current = 0,
          raf = null;
        function tick() {
          if (!bar) return;
          current += (target - current) * 0.18;
          if (target - current < 0.2) current = target;
          bar.style.width = current.toFixed(1) + "%";
          if (pct) pct.textContent = Math.round(current) + "%";
          if (current < target - 0.1) {
            raf = requestAnimationFrame(tick);
          } else {
            raf = null;
          }
        }
        var lastAt = Date.now();
        function setProgress(v, label) {
          lastAt = Date.now();
          target = Math.min(100, Math.max(target, v));
          if (label && st) st.textContent = label;
          if (!raf) raf = requestAnimationFrame(tick);
        }
        function done() {
          setProgress(100, "완료");
          setTimeout(function () {
            if (root) root.setAttribute("data-done", "true");
            setTimeout(function () {
              if (root && root.parentNode) root.parentNode.removeChild(root);
            }, 500);
          }, 220);
        }
        window.__bootProgress = setProgress;
        window.__bootDone = done;
        // 자체 마일스톤
        setProgress(10, "HTML 로딩중...");
        document.addEventListener("readystatechange", function () {
          if (document.readyState === "interactive") setProgress(30, "스크립트 준비중...");
          if (document.readyState === "complete") setProgress(60, "자산 로딩중...");
        });
        window.addEventListener("load", function () {
          setProgress(75, "게임 시작 준비...");
        });
        // Safety: 진행 이벤트가 10초 이상 끊기면 강제 완료(영구 차단 방지).
        // 고정 12초 타임아웃은 모바일 4G 에셋 preload(5~8초+) 도중 바를 닫아
        // "맨 검은화면"을 만들었다 — 진행률(Phaser loader)이 들어오는 동안은 연장한다.
        var guard = setInterval(function () {
          if (target >= 100) return clearInterval(guard);
          if (Date.now() - lastAt > 10000) {
            clearInterval(guard);
            done();
          }
        }, 1000);
      })();
    </script>
